    <div class="item type-mp3"
    data-title="Attachment"
    data-description="When I was four, my world was still very small. It was mostly my house, my parents, and Nga. Nga had long hair. I don’t remember what clothes she wore or what her voice sounded like exactly, but I remember her hair. In my mind, that was part of who she was. Long hair meant Nga.
One afternoon she came home with it cut short. Just like that. No warning, no explanation. I stared at her for a long time, trying to understand what had happened. She was smiling, talking as usual, but something felt wrong. It was like someone had quietly replaced a piece of her.
And I cried. Not the dramatic kind of crying that comes from getting hurt. I couldn’t explain why. I only knew that the image of her I had held onto so tightly no longer matched what I saw.
Looking back, I think that was the first time I realized that people can change, even when you don’t expect them to. At four years old, I didn’t have the language for that. I only knew that Nga’s long hair was gone, and somehow, that felt like losing something."

    <div class="item type-pdf"
    data-title="Changes"
    data-description="Sometimes, I find it funny when someone new met me and said: “Oh you should try this hairstyle. I giggle a little bit because I have tried every single hairstyle that people could imagine of. I swear, every single one. Because I have been through periods of change, through ups and downs, even moments of joy. I marked all the parts of my life with different hairstyles. So if people see me in just one hairstyle for a long time, it means everything is stable. But if there’s a time when something too joyful or too sad, I immediately changes my hairstyle. So I can confidently say that my hair holds a collection of memories in my life. One time people couldn’t even believe that I would change my hair like that. It was this curly afro style and I even dyed it. I remembered I met a friend at lunch while my hair was normal and straight and in the evening, I met her again at a party and I had this new strange hair. I felt like I had a new identity. When I walked in, people didn’t even recognized me, so I sat still to see if anyone noticed I was there. That’s the hairstyle that everyone was extremely shocked by, especially at that time. It was 2010, about 15 years ago. It looked so expressive to the point that I didn’t have to dress much because the hair already represented me: when I walked into a place, everyone had to turn around. I remember going to New York, my favorite city for the first time, with that hair. I was walking on the street and there were trucks behind kept honking at me. I turned around and though that something happened but they ended up complimenting on my hair. Like for an Asian, it was quite bold to have that hairstyle. I went on television and I got so many interesting comments about it. Later, I bleached my whole hair into white and people remembered me in events by it. Both of those hairstyles  marked different successful times of my life. When I looked back into my journey, I realized that it really reflects my mood through my hair. I don’t know this’s right or not, but the more I want to make an announcement to the outside world, the more I will show in my hairstyle: very bold, very strong. But when I’m looking at everything in a gentle way, I would want to keep my hair natural, original, and healthy. If I want to be individualistic, I would cut my hair short and style it. But right now, with my straight black hair, it’s not about me trying to shout a message to the world because after so many years working in this industry, I’ve said everything I wanted to. Now, as a host of a talkshow or a podcast, I want to listen and be invisible in front of my guests. Sometimes, I want to be a hug, or a therapist, or simply a friend listening to their stories."

    <p id="panelDescription"></p>

<script>
  const buttons = document.querySelectorAll('.media-container div');
  const allItems = document.querySelectorAll('.item');

  buttons.forEach(button => {
    button.addEventListener('click', () => {

      const type = button.className; // gets 'jpeg', 'mp3', etc.

      // If ALL is clicked → reset
      if (type === 'all') {
        allItems.forEach(item => item.classList.remove('dim'));
        return;
      }

      // Step 1: dim everything
      allItems.forEach(item => item.classList.add('dim'));

      // Step 2: undim matching items
      const activeItems = document.querySelectorAll('.type-' + type);
      activeItems.forEach(item => item.classList.remove('dim'));
    });
  });
  const items = document.querySelectorAll('.item');
  const panel = document.getElementById('panel');
  const closeBtn = document.getElementById('closePanel');

  const panelTitle = document.getElementById('panelTitle');
  const panelDesc = document.getElementById('panelDescription');
  const panelImg = document.getElementById('panelImage');

  items.forEach(item => {
    item.addEventListener('click', () => {
      // get data from clicked item
      const title = item.dataset.title;
      const desc = item.dataset.description
      const img = item.dataset.image;
;

      // inject into panel
      panelTitle.textContent = title;
      panelDesc.textContent = desc;
      panelImg.src = img;
      

      // open panel
      panel.classList.add('active');
    });
  });

  closeBtn.addEventListener('click', () => {
    panel.classList.remove('active');
  });

</script>
